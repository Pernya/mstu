x-airflow-common: &airflow-common
  build:
    context: .
  env_file:
    - path: .env.example
      required: true
    - path: .env
      required: false
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-retail-airflow-demo-secret-key-change-in-production}
    PYTHONPATH: /opt/airflow/src
    PROJECT_ROOT: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models
    - ./reports:/opt/airflow/reports
    - ./docs:/opt/airflow/docs
    - ./tests:/opt/airflow/tests:ro
    - ./pyproject.toml:/opt/airflow/pyproject.toml:ro
    - ./docker-compose.etl.yml:/opt/airflow/docker-compose.etl.yml:ro
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: retail_dwh_postgres
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: retail_airflow_init
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_USER:-airflow}
      --password ${AIRFLOW_PASSWORD:-airflow}
      --firstname ${AIRFLOW_FIRSTNAME:-Airflow}
      --lastname ${AIRFLOW_LASTNAME:-Admin}
      --role Admin
      --email ${AIRFLOW_EMAIL:-airflow@example.com} || true"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: retail_airflow_webserver
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: retail_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
